map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8000;
    server_name poker.mikechucktingle.net;
    resolver 8.8.8.8;

    # Setup log files
    access_log /var/log/nginx/poker_access.log;
    error_log /var/log/nginx/poker_error.log;

    # Dynamic Location Block for WebSocket Routing
    location ~ ^/game/(?<port_num>\d+)$ {
        rewrite ^/game/\d+$ / break;

        proxy_pass http://127.0.0.1:$port_num;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade; # References your map block above

        # Standard Network Transparency Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering to guarantee near-zero lag packet delivery
        proxy_buffering off;

        # WebSocket Long-Think Timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # Default handler for any requests that don't match the dynamic path
    location / {
        return 404; # Not Found 
    }
}